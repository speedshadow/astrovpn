version: '3.8'

services:
  # Serviço do frontend Astro
  astro-frontend:
    build:
      context: ./astro-frontend
      dockerfile: Dockerfile
    container_name: astro_frontend
    restart: always
    environment:
      - PUBLIC_SUPABASE_URL=http://kong:8000
      - PUBLIC_SUPABASE_ANON_KEY=${ANON_KEY}
      - PORT=4322
    ports:
      - "4322:4322"
    depends_on:
      - kong

