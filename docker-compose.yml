version: '3.8'

services:
  # Serviço para a aplicação frontend AstroVPN
  app:
    # Diz ao Docker para construir a imagem a partir do Dockerfile local
    build:
      context: .
      dockerfile: Dockerfile
    container_name: astrovpn_frontend
    restart: always
    environment:
      # A app conecta-se ao Supabase usando o nome do serviço 'kong' na rede interna do Docker
      - PUBLIC_SUPABASE_URL=http://kong:8000
      # A ANON_KEY será injetada a partir de um ficheiro .env que o nosso script de deploy vai criar
      - PUBLIC_SUPABASE_ANON_KEY=${ANON_KEY}
      # A connection string para a base de dados, também usando nomes de serviço internos
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/postgres
      - PORT=4322
    # Mapeia a porta interna da app para a porta externa do VPS.
    # Isto será usado principalmente para acesso via IP. O Caddy tratará do acesso por domínio.
    ports:
      - "4322:4322"
    depends_on:
      # Garante que a app só arranca depois dos serviços do Supabase estarem prontos
      - kong
      - db

# Inclui todos os serviços oficiais do Supabase a partir do seu próprio ficheiro compose.
# O nosso novo script de deploy garantirá que o repositório do Supabase existe em ./supabase/docker
include:
  - path: ./supabase/docker/docker-compose.yml
